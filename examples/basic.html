<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZX Spectrum — Basic emulator</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: #14141a; color: #d7d7de; font: 15px/1.5 system-ui, sans-serif; }
  main { text-align: center; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  p  { margin: 6px 0; color: #9a9aa6; }
  /* Internal buffer is 320x240; display at exact 2x so every ZX pixel maps to a
     uniform 2x2 block (nearest-neighbour). Non-integer scaling was making some
     pixels 1px and others 2px wide. */
  canvas { width: 640px; height: 480px; image-rendering: pixelated;
           background: #000; border-radius: 6px; box-shadow: 0 8px 40px #0008;
           margin: 16px auto; display: block; }
  @media (max-width: 700px) { canvas { width: 100%; height: auto; } }
  a { color: #7db3ff; }
  kbd { background:#2a2a34; border-radius:4px; padding:1px 6px; font-size:12px; }
</style>
</head>
<body>
<main>
  <h1>ZX Spectrum 48K — Basic</h1>
  <p>The real BASIC ROM, booted live in your browser. Just start typing.</p>
  <canvas id="screen" width="320" height="240"></canvas>
  <p>Try: <kbd>P</kbd> types <code>PRINT</code>, then <kbd>2</kbd> <kbd>+</kbd> <kbd>2</kbd> <kbd>Enter</kbd>.
     Symbols like <kbd>=</kbd> <kbd>+</kbd> <kbd>"</kbd> work, and sound starts on your first keypress.</p>
  <p style="font-size:13px">Powered by <code>@zx-vibes/machine</code> · <a href="index.html">← all demos</a></p>

  <!-- This is the whole embed: one script, one canvas, three lines. -->
  <script src="zxspectrum.js"></script>
  <script>
    const zx = ZXSpectrum.create();
    zx.attach(document.getElementById('screen'));
    zx.start();
  </script>
</main>
</body>
</html>
