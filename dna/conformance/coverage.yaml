    notes: "W10.11 (Track D/B5, fidelity-tier; ADR-0024). dna/domain/tape-loading.md 'Instant / trap loading' TAPE-INSTANT-CONCEPT-001 (decision:ADR-0024 — the trap mechanism: a software shortcut that loads in zero machine time) / TAPE-INSTANT-RESULT-001 / -FLAG-001 / -EQUIV-001 (provenance hardware — what it must PRODUCE is the documented LD-BYTES result, pinned by the equivalence to the real ROM, not an invented constant). instantLoad modeled in @zx-vibes/machine (packages/machine/src/tape-edge-load.mjs, beside edgeLoad). The oracle is instant == edge (TAPE-INSTANT-EQUIV-001): the CI runner run-tape-instant-load-fixtures.mjs (kind tape-instant-load-query) loads each block BOTH by the instant trap (no ROM, tStates 0) AND by the real ROM LD-BYTES edge-load (0x0556 over the W10.9 EAR pulse stream) and asserts they agree on {ok, bytesLoaded, RAM} and both equal the SOURCE bytes — a mutual cross-check against the real ROM, FABRICATION-FREE (expected.ram IS the source). Only the observable triplet is the contract; the loaders' internal `reason` string is not (the ROM may time out where instant names the cause). Two fixtures: a 24-byte data block (edge half ~7.5M T, budget 12M) + an 8-byte header block (8063-pilot leader, budget 25M). FIDELITY-TIER verification: the self-test anchors instant == edge against the real ROM on 5 judge blocks (well-formed data/header + flag-mismatch leaving RAM untouched + corrupt-checksum where data reaches RAM but carry resets — instant matches on the failure cases too), agrees with an independent spec-derived reference over 3072 cases across all 256 flags, and rejects four adversarial broken instant models (ignore-flag-mismatch / skip-checksum / store-flag-and-checksum / wrong-byte-count) that each diverge from the real ROM. Two blind regenerations from the spec agreed with the shipped model AND the real ROM over 3584 cases + the real-ROM anchors (no DNA gap). Closes the last open ADR-0024 gap (B5)."

