  - id: TAPE-INSTANT-LOAD-001
    area: emulator
    behavior: "the instant/trap loader reproduces the real ROM LD-BYTES result for the same tape block WITHOUT running the ROM or the pulse stream, in zero machine time: given the block body [flag][data..][checksum] and the IX=destination/DE=data count/A=flag contract it stores the DE data bytes to RAM, XOR-checksums flag+data+checksum, and returns the carry result; for the SAME block an instant load and the real-ROM edge load agree on the observable {ok, bytesLoaded, RAM} (including the flag-mismatch and corrupt-checksum failure cases) and both equal the source bytes; a model that ignores a flag mismatch, skips the checksum, stores the flag/checksum, or loads the wrong byte count diverges from the real ROM and fails"
    tier: fidelity
    provenance: hardware
    fixtures: [conformance/tape/instant-load.json, conformance/tape/run-tape-instant-load-fixtures.mjs, conformance/tape/run-tape-instant-load-fixtures-self-test.mjs]
