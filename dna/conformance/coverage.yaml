  - id: SCREEN-FRAMEBUFFER-001
    area: gallery
    behavior: "a captured 6912-byte screen image (display file 0x4000-0x57FF + attribute file 0x5800-0x5AFF) plus a frame counter assembles into the 256x192 framebuffer: each pixel's display byte is at displayByteAddress(x,y), its bit is 7-(x&7) (MSB leftmost), its attribute byte is at attributeAddress(x,y), and the index is pixelColorIndex(attr, pixelOn, flashPhase(frame)) -> RGB via palette.yaml; a linear (non-thirds) decoder, an LSB-first bit order, a single-attribute screen, or an ignored FLASH phase all render a visibly wrong screen and fail"
    tier: contract
    provenance: decision:ADR-0022
    fixtures: [conformance/screen/screen-framebuffer.json, conformance/screen/run-framebuffer-fixtures.mjs, conformance/screen/run-framebuffer-fixtures-self-test.mjs, conformance/screen/screen-framebuffer-model.mjs]
    status: covered
    notes: "W10.3 (Track A, gallery render integration, decision:ADR-0022). dna/product/screen-render.md SCREEN-FRAMEBUFFER-001 (Framebuffer assembly). screen-framebuffer-model.mjs composes the SHIPPED @zx-vibes/ula decode (displayByteAddress / attributeAddress / pixelColorIndex / flashPhase) with the bitmap-bit extraction (7-(x&7), MM-SCREEN-DISPLAY-FILE-001 MSB-leftmost) and the palette.yaml RGB (SCREEN-PALETTE-001). This is the INTEGRATION the per-decode rows (SCREEN-ADDR-001, SCREEN-ATTR-DECODE-001) miss: a renderer can pass both yet still assemble a broken screen (the W8 / consumer SAVE-pp symptom). Two blind regenerations from the spec agreed byte-for-byte with the shipped model over 4.1M pixels (7 screens x 12 frames). The self-test validates against an independent re-derivation and rejects linear (non-thirds) addressing, LSB-first bit order, a single-attribute screen, and an ignored FLASH phase."

