  # --- DDCB/FDCB double-prefixed bit/rotate group (Phase B5, ADR-0025) --------
  # IX+d (DDCB) / IY+d (FDCB) rotate/shift, BIT, RES/SET. Bytes + canonical syntax
  # verbatim from the ratified Phase-A1 generator (FUSE-seeded). The 4-byte encoding
  # is prefix, CB, displacement (`d` slot, Z80-OPC-SLOT-TOKENS-001), then the opcode
  # byte. The opcode's low 3 bits (z) select a register copy target B,C,D,E,H,L,-,A
  # for z=0..7; z=6 is the canonical (HL)-equivalent form acting only on (IX+d).
  # The 7 z!=6 forms ALSO store the result into register r -> undocumented result-copy
  # syntax `RLC (IX+d),B` / `SET 0,(IX+d),B` per the ratified bijection decision (D1);
  # they round-trip. BIT ignores z, so only its canonical z=6 form is a row (the other
  # 7 per bit are decode-only aliases, documented in z80-opcodes.md, not duplicate rows).
