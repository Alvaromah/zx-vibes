  # --- ED-prefixed NEG / RRD / RLD (Phase B3, ADR-0025) ---
  # Bytes + canonical syntax from the ratified Phase-A1 generator; timing z80-spec UM0080,
  # every T cross-checked against the FUSE ED end-state (NEG=8, RRD/RLD=18; all agree).
  # NEG (0xED 0x44, the canonical encoding) two's-complements A; it changes every flag
  # (S,Z,H,P/V,N,C and the undocumented 5/3): N=1, C set iff A!=0, P/V set iff A was 0x80.
  # The seven undocumented duplicate encodings (ED 4C/54/5C/64/6C/74/7C) are decode-only
  # aliases of this canonical row, not separate rows (OPCODE-DECODE-UNIQUE policy, Phase C).
