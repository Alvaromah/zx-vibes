# Z80 opcode domain table (assembler-visible encodings, timing, and flags).
#
# Compressed schema: one terse row per encoding. Derived fields are NOT written
# here -- the conformance loader (z80-opcodes-check.mjs `normalizeTable`) fills them:
#   - encoding.lengthBytes  = bytes.length
#   - flags (default)        = affected: [], unchanged: all 8  (only the ~11 rows that
#                              change flags carry an explicit `flags:` clause)
#   - caseInsensitive=true, provenance=z80-spec  (file-level defaults below)
#   - byte values            = hex string -> { value, hex }; non-hex token -> parameter
#   - timing                 = t/m scalars, or [taken, notTaken] for conditional forms
# Operand semantics (roles, widths, cycle breakdown) live in z80-opcodes.md prose.
schemaVersion: 1
status: partial
purpose: "Assembler-visible Z80 opcode encodings, lengths, flags, and timing."
defaults:
  caseInsensitive: true
  provenance: z80-spec
  flags: { affected: [], unchanged: [S, Z, "5", H, "3", PV, N, C] }
sources:
  z80-spec:
    title: "Zilog Z80 CPU User Manual UM0080"
    url: "https://www.zilog.com/docs/z80/um0080.pdf"
    usedFor:
      - "LD r,n operation"
