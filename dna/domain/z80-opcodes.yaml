  # --- ALU A,r / A,(HL) / A,n (8 operations x 8 register/memory forms + immediate) ---
  # All eight ALU ops set the full flag set (S,Z,5,H,3,PV,N,C) per z80-spec UM0080:
  # ADD/ADC/SUB/SBC/CP -> PV=overflow, N from op (0 add / 1 sub); AND/OR/XOR -> PV=parity,
  # H fixed (AND=1, OR/XOR=0), N=0, C=0. Register forms 4T 1M; (HL) and immediate 7T 2M.
  # ADD/ADC/SBC use the explicit accumulator syntax "ADD A,s"; SUB/AND/XOR/OR/CP take one operand.
  - id: Z80-OPC-ALU-ADD-001
    syntax: "ADD A,{s}"
    bytes: ["{op}"]
    t: 4
    m: 1
    flags: { affected: [S, Z, "5", H, "3", PV, N, C], unchanged: [] }
    conformance: [ASM-EMIT-ALU-ADD-001]
    rows:
