name: Release

on:
  push:
    branches: [main]

env:
  SJASMPLUS_VERSION: 1.23.1

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Cache sjasmplus
        id: cache-sjasmplus
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/sjasmplus
          key: sjasmplus-${{ env.SJASMPLUS_VERSION }}-${{ runner.os }}
      - name: Build sjasmplus from source
        if: steps.cache-sjasmplus.outputs.cache-hit != 'true'
        run: |
          curl -sL -o /tmp/sjasmplus-src.tar.xz \
            "https://github.com/z00m128/sjasmplus/releases/download/v${SJASMPLUS_VERSION}/sjasmplus-${SJASMPLUS_VERSION}-src.tar.xz"
          tar xf /tmp/sjasmplus-src.tar.xz -C /tmp
          make -C "/tmp/sjasmplus-${SJASMPLUS_VERSION}" -j4
          mkdir -p ~/.local/bin
          cp "/tmp/sjasmplus-${SJASMPLUS_VERSION}/sjasmplus" ~/.local/bin/
      - name: Add sjasmplus to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

  release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
